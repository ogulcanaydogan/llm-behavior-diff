name: Model Upgrade Regression Gate

on:
  workflow_dispatch:
    inputs:
      # Keep workflow_dispatch input count <= 25 (GitHub Actions limit).
      model_a:
        description: "Baseline model (A)"
        required: true
        default: gpt-4o
        type: string
      model_b:
        description: "Candidate model (B)"
        required: true
        default: gpt-4.5
        type: string
      suite_list:
        description: "Optional comma-separated suite paths (defaults to all built-in suites)"
        required: false
        type: string
      max_workers:
        description: "Max workers for llm-diff run"
        required: false
        default: 4
        type: number
      gate_policy:
        description: "Risk-tier gate policy"
        required: false
        default: strict
        type: choice
        options:
          - strict
          - balanced
          - permissive
      gate_policy_pack:
        description: "Policy pack"
        required: false
        default: core
        type: choice
        options:
          - core
          - risk_averse
          - velocity
      gate_policy_file:
        description: "Optional repo-relative custom policy YAML file (takes precedence)"
        required: false
        type: string
      factual_connector:
        description: "Optional external factual connector"
        required: false
        default: none
        type: choice
        options:
          - none
          - wikipedia
      factual_connector_timeout:
        description: "Timeout in seconds for external factual connector requests"
        required: false
        default: 8
        type: number
      factual_connector_max_results:
        description: "Max external factual evidence results per test"
        required: false
        default: 3
        type: number
      export_connector:
        description: "Optional direct export connector for generated suite exports"
        required: false
        default: none
        type: choice
        options:
          - none
          - http
          - s3
          - gcs
          - bigquery
          - snowflake
          - redshift
          - azure_blob
          - databricks
          - postgres
          - clickhouse
          - mssql
          - oracle
          - mysql
      export_connector_endpoint:
        description: "Optional export connector endpoint URL (required for export_connector=http)"
        required: false
        type: string
      export_connector_timeout:
        description: "Timeout in seconds for export connector requests"
        required: false
        default: 10
        type: number
      export_s3_bucket:
        description: "Optional S3 bucket (required for export_connector=s3)"
        required: false
        type: string
      export_s3_prefix:
        description: "Optional S3 key prefix for export objects"
        required: false
        default: ""
        type: string
      export_bq_project:
        description: "Optional BigQuery project id (required for export_connector=bigquery)"
        required: false
        type: string
      export_bq_dataset:
        description: "Optional BigQuery dataset id (required for export_connector=bigquery)"
        required: false
        type: string
      export_bq_table:
        description: "Optional BigQuery table id (required for export_connector=bigquery)"
        required: false
        type: string
      export_bq_location:
        description: "Optional BigQuery location override"
        required: false
        type: string
      export_sf_account:
        description: "Optional Snowflake account (required for export_connector=snowflake)"
        required: false
        type: string
      export_sf_user:
        description: "Optional Snowflake user (required for export_connector=snowflake)"
        required: false
        type: string
      export_sf_warehouse:
        description: "Optional Snowflake warehouse (required for export_connector=snowflake)"
        required: false
        type: string
      export_sf_database:
        description: "Optional Snowflake database (required for export_connector=snowflake)"
        required: false
        type: string
      export_sf_schema:
        description: "Optional Snowflake schema (required for export_connector=snowflake)"
        required: false
        type: string
      export_sf_table:
        description: "Optional Snowflake table (required for export_connector=snowflake)"
        required: false
        type: string

  workflow_call:
    inputs:
      model_a:
        required: true
        type: string
      model_b:
        required: true
        type: string
      suite_list:
        required: false
        type: string
      max_workers:
        required: false
        type: number
        default: 4
      gate_policy:
        required: false
        type: string
        default: strict
      gate_policy_pack:
        required: false
        type: string
        default: core
      gate_policy_file:
        required: false
        type: string
      factual_connector:
        required: false
        type: string
        default: none
      factual_connector_timeout:
        required: false
        type: number
        default: 8
      factual_connector_max_results:
        required: false
        type: number
        default: 3
      export_connector:
        required: false
        type: string
        default: none
      export_connector_endpoint:
        required: false
        type: string
      export_connector_timeout:
        required: false
        type: number
        default: 10
      export_s3_bucket:
        required: false
        type: string
      export_s3_prefix:
        required: false
        type: string
        default: ""
      export_bq_project:
        required: false
        type: string
      export_bq_dataset:
        required: false
        type: string
      export_bq_table:
        required: false
        type: string
      export_bq_location:
        required: false
        type: string
      export_sf_account:
        required: false
        type: string
      export_sf_user:
        required: false
        type: string
      export_sf_warehouse:
        required: false
        type: string
      export_sf_database:
        required: false
        type: string
      export_sf_schema:
        required: false
        type: string
      export_sf_table:
        required: false
        type: string
    secrets:
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      EXPORT_CONNECTOR_API_KEY:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_SESSION_TOKEN:
        required: false
      SNOWFLAKE_PASSWORD:
        required: false
      REDSHIFT_PASSWORD:
        required: false
      DATABRICKS_TOKEN:
        required: false
      POSTGRES_PASSWORD:
        required: false
      CLICKHOUSE_DSN:
        required: false
      MSSQL_PASSWORD:
        required: false
      ORACLE_PASSWORD:
        required: false
      MYSQL_PASSWORD:
        required: false

permissions:
  contents: read

concurrency:
  # Keep concurrency key event-safe across manual and reusable invocations.
  group: model-upgrade-regression-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  # Force JavaScript-based actions onto Node24 ahead of GitHub's Node20 deprecation window.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  regression-gate:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MODEL_A: ${{ inputs.model_a }}
      MODEL_B: ${{ inputs.model_b }}
      SUITE_LIST: ${{ inputs.suite_list }}
      MAX_WORKERS: ${{ inputs.max_workers }}
      GATE_POLICY: ${{ inputs.gate_policy }}
      GATE_POLICY_PACK: ${{ inputs.gate_policy_pack }}
      GATE_POLICY_FILE: ${{ inputs.gate_policy_file }}
      FACTUAL_CONNECTOR: ${{ inputs.factual_connector }}
      FACTUAL_CONNECTOR_TIMEOUT: ${{ inputs.factual_connector_timeout }}
      FACTUAL_CONNECTOR_MAX_RESULTS: ${{ inputs.factual_connector_max_results }}
      EXPORT_CONNECTOR: ${{ inputs.export_connector }}
      EXPORT_CONNECTOR_ENDPOINT: ${{ inputs.export_connector_endpoint }}
      EXPORT_CONNECTOR_TIMEOUT: ${{ inputs.export_connector_timeout }}
      EXPORT_CONNECTOR_API_KEY: ${{ secrets.EXPORT_CONNECTOR_API_KEY }}
      EXPORT_S3_BUCKET: ${{ inputs.export_s3_bucket }}
      EXPORT_S3_PREFIX: ${{ inputs.export_s3_prefix }}
      EXPORT_GCS_BUCKET: ${{ vars.EXPORT_GCS_BUCKET }}
      EXPORT_GCS_PREFIX: ${{ vars.EXPORT_GCS_PREFIX }}
      EXPORT_GCS_PROJECT: ${{ vars.EXPORT_GCS_PROJECT }}
      EXPORT_AZ_ACCOUNT_URL: ${{ vars.EXPORT_AZ_ACCOUNT_URL }}
      EXPORT_AZ_CONTAINER: ${{ vars.EXPORT_AZ_CONTAINER }}
      EXPORT_AZ_PREFIX: ${{ vars.EXPORT_AZ_PREFIX }}
      EXPORT_BQ_PROJECT: ${{ inputs.export_bq_project }}
      EXPORT_BQ_DATASET: ${{ inputs.export_bq_dataset }}
      EXPORT_BQ_TABLE: ${{ inputs.export_bq_table }}
      EXPORT_BQ_LOCATION: ${{ inputs.export_bq_location }}
      EXPORT_SF_ACCOUNT: ${{ inputs.export_sf_account }}
      EXPORT_SF_USER: ${{ inputs.export_sf_user }}
      EXPORT_SF_WAREHOUSE: ${{ inputs.export_sf_warehouse }}
      EXPORT_SF_DATABASE: ${{ inputs.export_sf_database }}
      EXPORT_SF_SCHEMA: ${{ inputs.export_sf_schema }}
      EXPORT_SF_TABLE: ${{ inputs.export_sf_table }}
      EXPORT_RS_HOST: ${{ vars.EXPORT_RS_HOST }}
      EXPORT_RS_PORT: ${{ vars.EXPORT_RS_PORT }}
      EXPORT_RS_DATABASE: ${{ vars.EXPORT_RS_DATABASE }}
      EXPORT_RS_USER: ${{ vars.EXPORT_RS_USER }}
      EXPORT_RS_SCHEMA: ${{ vars.EXPORT_RS_SCHEMA }}
      EXPORT_RS_TABLE: ${{ vars.EXPORT_RS_TABLE }}
      EXPORT_RS_SSLMODE: ${{ vars.EXPORT_RS_SSLMODE }}
      EXPORT_DBX_HOST: ${{ vars.EXPORT_DBX_HOST }}
      EXPORT_DBX_HTTP_PATH: ${{ vars.EXPORT_DBX_HTTP_PATH }}
      EXPORT_DBX_CATALOG: ${{ vars.EXPORT_DBX_CATALOG }}
      EXPORT_DBX_SCHEMA: ${{ vars.EXPORT_DBX_SCHEMA }}
      EXPORT_DBX_TABLE: ${{ vars.EXPORT_DBX_TABLE }}
      EXPORT_PG_HOST: ${{ vars.EXPORT_PG_HOST }}
      EXPORT_PG_PORT: ${{ vars.EXPORT_PG_PORT }}
      EXPORT_PG_DATABASE: ${{ vars.EXPORT_PG_DATABASE }}
      EXPORT_PG_USER: ${{ vars.EXPORT_PG_USER }}
      EXPORT_PG_SCHEMA: ${{ vars.EXPORT_PG_SCHEMA }}
      EXPORT_PG_TABLE: ${{ vars.EXPORT_PG_TABLE }}
      EXPORT_PG_SSLMODE: ${{ vars.EXPORT_PG_SSLMODE }}
      EXPORT_CH_DATABASE: ${{ vars.EXPORT_CH_DATABASE }}
      EXPORT_CH_TABLE: ${{ vars.EXPORT_CH_TABLE }}
      EXPORT_MS_HOST: ${{ vars.EXPORT_MS_HOST }}
      EXPORT_MS_PORT: ${{ vars.EXPORT_MS_PORT }}
      EXPORT_MS_DATABASE: ${{ vars.EXPORT_MS_DATABASE }}
      EXPORT_MS_USER: ${{ vars.EXPORT_MS_USER }}
      EXPORT_MS_SCHEMA: ${{ vars.EXPORT_MS_SCHEMA }}
      EXPORT_MS_TABLE: ${{ vars.EXPORT_MS_TABLE }}
      EXPORT_OR_HOST: ${{ vars.EXPORT_OR_HOST }}
      EXPORT_OR_PORT: ${{ vars.EXPORT_OR_PORT }}
      EXPORT_OR_SERVICE_NAME: ${{ vars.EXPORT_OR_SERVICE_NAME }}
      EXPORT_OR_USER: ${{ vars.EXPORT_OR_USER }}
      EXPORT_OR_SCHEMA: ${{ vars.EXPORT_OR_SCHEMA }}
      EXPORT_OR_TABLE: ${{ vars.EXPORT_OR_TABLE }}
      EXPORT_MYSQL_HOST: ${{ vars.EXPORT_MYSQL_HOST }}
      EXPORT_MYSQL_PORT: ${{ vars.EXPORT_MYSQL_PORT }}
      EXPORT_MYSQL_DATABASE: ${{ vars.EXPORT_MYSQL_DATABASE }}
      EXPORT_MYSQL_USER: ${{ vars.EXPORT_MYSQL_USER }}
      EXPORT_MYSQL_TABLE: ${{ vars.EXPORT_MYSQL_TABLE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      LLM_DIFF_EXPORT_SF_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      LLM_DIFF_EXPORT_RS_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}
      LLM_DIFF_EXPORT_DBX_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      LLM_DIFF_EXPORT_PG_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      LLM_DIFF_EXPORT_CH_DSN: ${{ secrets.CLICKHOUSE_DSN }}
      LLM_DIFF_EXPORT_MS_PASSWORD: ${{ secrets.MSSQL_PASSWORD }}
      LLM_DIFF_EXPORT_OR_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
      LLM_DIFF_EXPORT_MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate model provider secrets
        run: |
          python - <<'PY'
          import os

          model_a = os.environ["MODEL_A"].strip().lower()
          model_b = os.environ["MODEL_B"].strip().lower()
          openai_key = os.environ.get("OPENAI_API_KEY", "").strip()
          anthropic_key = os.environ.get("ANTHROPIC_API_KEY", "").strip()

          models = [model_a, model_b]
          needs_openai = any(m.startswith(("gpt-", "o1-", "o3-")) for m in models)
          needs_anthropic = any(m.startswith("claude-") for m in models)

          if needs_openai and not openai_key:
              raise SystemExit("OPENAI_API_KEY is required for selected model(s).")
          if needs_anthropic and not anthropic_key:
              raise SystemExit("ANTHROPIC_API_KEY is required for selected model(s).")

          print("Model secret validation passed.")
          PY

      - name: Resolve suite list
        run: |
          if [ -n "$SUITE_LIST" ]; then
            : > suites_to_run.txt
            IFS=',' read -ra PARTS <<< "$SUITE_LIST"
            for part in "${PARTS[@]}"; do
              suite="$(echo "$part" | xargs)"
              if [ -n "$suite" ]; then
                echo "$suite" >> suites_to_run.txt
              fi
            done
          else
            printf '%s\n' \
              "suites/general_knowledge.yaml" \
              "suites/instruction_following.yaml" \
              "suites/safety_boundaries.yaml" \
              "suites/coding_tasks.yaml" \
              "suites/reasoning.yaml" \
              > suites_to_run.txt
          fi

          echo "Suites to run:"
          cat suites_to_run.txt

      - name: Run behavioral diff suites
        run: |
          mkdir -p artifacts/reports
          mkdir -p artifacts/exports
          export_args_csv=()
          export_args_ndjson=()
          export_args_junit=()
          if [ "$EXPORT_CONNECTOR" != "none" ]; then
            connector_args=(
              --export-connector "$EXPORT_CONNECTOR"
              --export-timeout "$EXPORT_CONNECTOR_TIMEOUT"
            )

            if [ "$EXPORT_CONNECTOR" = "http" ]; then
              if [ -z "$EXPORT_CONNECTOR_ENDPOINT" ]; then
                echo "export_connector_endpoint is required when export_connector=http."
                exit 1
              fi
              connector_args+=(--export-endpoint "$EXPORT_CONNECTOR_ENDPOINT")
              if [ -n "$EXPORT_CONNECTOR_API_KEY" ]; then
                connector_args+=(--export-api-key "$EXPORT_CONNECTOR_API_KEY")
              fi
              export_args_csv=("${connector_args[@]}")
              export_args_ndjson=("${connector_args[@]}")
              export_args_junit=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "s3" ]; then
              if [ -z "$EXPORT_S3_BUCKET" ]; then
                echo "export_s3_bucket is required when export_connector=s3."
                exit 1
              fi
              connector_args+=(--export-s3-bucket "$EXPORT_S3_BUCKET")
              connector_args+=(--export-s3-prefix "$EXPORT_S3_PREFIX")
              export_args_csv=("${connector_args[@]}")
              export_args_ndjson=("${connector_args[@]}")
              export_args_junit=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "gcs" ]; then
              if [ -z "$EXPORT_GCS_BUCKET" ]; then
                echo "EXPORT_GCS_BUCKET repository variable is required when export_connector=gcs."
                exit 1
              fi
              connector_args+=(--export-gcs-bucket "$EXPORT_GCS_BUCKET")
              connector_args+=(--export-gcs-prefix "${EXPORT_GCS_PREFIX:-}")
              if [ -n "${EXPORT_GCS_PROJECT:-}" ]; then
                connector_args+=(--export-gcs-project "$EXPORT_GCS_PROJECT")
              fi
              export_args_csv=("${connector_args[@]}")
              export_args_ndjson=("${connector_args[@]}")
              export_args_junit=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "azure_blob" ]; then
              if [ -z "$EXPORT_AZ_ACCOUNT_URL" ]; then
                echo "EXPORT_AZ_ACCOUNT_URL repository variable is required when export_connector=azure_blob."
                exit 1
              fi
              if [ -z "$EXPORT_AZ_CONTAINER" ]; then
                echo "EXPORT_AZ_CONTAINER repository variable is required when export_connector=azure_blob."
                exit 1
              fi
              connector_args+=(--export-az-account-url "$EXPORT_AZ_ACCOUNT_URL")
              connector_args+=(--export-az-container "$EXPORT_AZ_CONTAINER")
              connector_args+=(--export-az-prefix "${EXPORT_AZ_PREFIX:-}")
              export_args_csv=("${connector_args[@]}")
              export_args_ndjson=("${connector_args[@]}")
              export_args_junit=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "bigquery" ]; then
              if [ -z "$EXPORT_BQ_PROJECT" ]; then
                echo "export_bq_project is required when export_connector=bigquery."
                exit 1
              fi
              if [ -z "$EXPORT_BQ_DATASET" ]; then
                echo "export_bq_dataset is required when export_connector=bigquery."
                exit 1
              fi
              if [ -z "$EXPORT_BQ_TABLE" ]; then
                echo "export_bq_table is required when export_connector=bigquery."
                exit 1
              fi
              connector_args+=(--export-bq-project "$EXPORT_BQ_PROJECT")
              connector_args+=(--export-bq-dataset "$EXPORT_BQ_DATASET")
              connector_args+=(--export-bq-table "$EXPORT_BQ_TABLE")
              if [ -n "$EXPORT_BQ_LOCATION" ]; then
                connector_args+=(--export-bq-location "$EXPORT_BQ_LOCATION")
              fi
              export_args_ndjson=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "snowflake" ]; then
              if [ -z "$EXPORT_SF_ACCOUNT" ]; then
                echo "export_sf_account is required when export_connector=snowflake."
                exit 1
              fi
              if [ -z "$EXPORT_SF_USER" ]; then
                echo "export_sf_user is required when export_connector=snowflake."
                exit 1
              fi
              if [ -z "$LLM_DIFF_EXPORT_SF_PASSWORD" ]; then
                echo "SNOWFLAKE_PASSWORD secret is required when export_connector=snowflake."
                exit 1
              fi
              if [ -z "$EXPORT_SF_WAREHOUSE" ]; then
                echo "export_sf_warehouse is required when export_connector=snowflake."
                exit 1
              fi
              if [ -z "$EXPORT_SF_DATABASE" ]; then
                echo "export_sf_database is required when export_connector=snowflake."
                exit 1
              fi
              if [ -z "$EXPORT_SF_SCHEMA" ]; then
                echo "export_sf_schema is required when export_connector=snowflake."
                exit 1
              fi
              if [ -z "$EXPORT_SF_TABLE" ]; then
                echo "export_sf_table is required when export_connector=snowflake."
                exit 1
              fi
              connector_args+=(--export-sf-account "$EXPORT_SF_ACCOUNT")
              connector_args+=(--export-sf-user "$EXPORT_SF_USER")
              connector_args+=(--export-sf-warehouse "$EXPORT_SF_WAREHOUSE")
              connector_args+=(--export-sf-database "$EXPORT_SF_DATABASE")
              connector_args+=(--export-sf-schema "$EXPORT_SF_SCHEMA")
              connector_args+=(--export-sf-table "$EXPORT_SF_TABLE")
              export_args_ndjson=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "redshift" ]; then
              if [ -z "$EXPORT_RS_HOST" ]; then
                echo "EXPORT_RS_HOST repository variable is required when export_connector=redshift."
                exit 1
              fi
              if [ -z "$EXPORT_RS_DATABASE" ]; then
                echo "EXPORT_RS_DATABASE repository variable is required when export_connector=redshift."
                exit 1
              fi
              if [ -z "$EXPORT_RS_USER" ]; then
                echo "EXPORT_RS_USER repository variable is required when export_connector=redshift."
                exit 1
              fi
              if [ -z "$LLM_DIFF_EXPORT_RS_PASSWORD" ]; then
                echo "REDSHIFT_PASSWORD secret is required when export_connector=redshift."
                exit 1
              fi
              if [ -z "$EXPORT_RS_SCHEMA" ]; then
                echo "EXPORT_RS_SCHEMA repository variable is required when export_connector=redshift."
                exit 1
              fi
              if [ -z "$EXPORT_RS_TABLE" ]; then
                echo "EXPORT_RS_TABLE repository variable is required when export_connector=redshift."
                exit 1
              fi
              connector_args+=(--export-rs-host "$EXPORT_RS_HOST")
              connector_args+=(--export-rs-port "${EXPORT_RS_PORT:-5439}")
              connector_args+=(--export-rs-database "$EXPORT_RS_DATABASE")
              connector_args+=(--export-rs-user "$EXPORT_RS_USER")
              connector_args+=(--export-rs-schema "$EXPORT_RS_SCHEMA")
              connector_args+=(--export-rs-table "$EXPORT_RS_TABLE")
              connector_args+=(--export-rs-sslmode "${EXPORT_RS_SSLMODE:-require}")
              export_args_ndjson=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "databricks" ]; then
              if [ -z "$EXPORT_DBX_HOST" ]; then
                echo "EXPORT_DBX_HOST repository variable is required when export_connector=databricks."
                exit 1
              fi
              if [ -z "$EXPORT_DBX_HTTP_PATH" ]; then
                echo "EXPORT_DBX_HTTP_PATH repository variable is required when export_connector=databricks."
                exit 1
              fi
              if [ -z "$LLM_DIFF_EXPORT_DBX_TOKEN" ]; then
                echo "DATABRICKS_TOKEN secret is required when export_connector=databricks."
                exit 1
              fi
              if [ -z "$EXPORT_DBX_CATALOG" ]; then
                echo "EXPORT_DBX_CATALOG repository variable is required when export_connector=databricks."
                exit 1
              fi
              if [ -z "$EXPORT_DBX_SCHEMA" ]; then
                echo "EXPORT_DBX_SCHEMA repository variable is required when export_connector=databricks."
                exit 1
              fi
              if [ -z "$EXPORT_DBX_TABLE" ]; then
                echo "EXPORT_DBX_TABLE repository variable is required when export_connector=databricks."
                exit 1
              fi
              connector_args+=(--export-dbx-host "$EXPORT_DBX_HOST")
              connector_args+=(--export-dbx-http-path "$EXPORT_DBX_HTTP_PATH")
              connector_args+=(--export-dbx-catalog "$EXPORT_DBX_CATALOG")
              connector_args+=(--export-dbx-schema "$EXPORT_DBX_SCHEMA")
              connector_args+=(--export-dbx-table "$EXPORT_DBX_TABLE")
              export_args_ndjson=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "postgres" ]; then
              if [ -z "$EXPORT_PG_HOST" ]; then
                echo "EXPORT_PG_HOST repository variable is required when export_connector=postgres."
                exit 1
              fi
              if [ -z "$EXPORT_PG_DATABASE" ]; then
                echo "EXPORT_PG_DATABASE repository variable is required when export_connector=postgres."
                exit 1
              fi
              if [ -z "$EXPORT_PG_USER" ]; then
                echo "EXPORT_PG_USER repository variable is required when export_connector=postgres."
                exit 1
              fi
              if [ -z "$LLM_DIFF_EXPORT_PG_PASSWORD" ]; then
                echo "POSTGRES_PASSWORD secret is required when export_connector=postgres."
                exit 1
              fi
              if [ -z "$EXPORT_PG_SCHEMA" ]; then
                echo "EXPORT_PG_SCHEMA repository variable is required when export_connector=postgres."
                exit 1
              fi
              if [ -z "$EXPORT_PG_TABLE" ]; then
                echo "EXPORT_PG_TABLE repository variable is required when export_connector=postgres."
                exit 1
              fi
              connector_args+=(--export-pg-host "$EXPORT_PG_HOST")
              connector_args+=(--export-pg-port "${EXPORT_PG_PORT:-5432}")
              connector_args+=(--export-pg-database "$EXPORT_PG_DATABASE")
              connector_args+=(--export-pg-user "$EXPORT_PG_USER")
              connector_args+=(--export-pg-schema "$EXPORT_PG_SCHEMA")
              connector_args+=(--export-pg-table "$EXPORT_PG_TABLE")
              connector_args+=(--export-pg-sslmode "${EXPORT_PG_SSLMODE:-require}")
              export_args_ndjson=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "clickhouse" ]; then
              if [ -z "$LLM_DIFF_EXPORT_CH_DSN" ]; then
                echo "CLICKHOUSE_DSN secret is required when export_connector=clickhouse."
                exit 1
              fi
              if [ -z "$EXPORT_CH_DATABASE" ]; then
                echo "EXPORT_CH_DATABASE repository variable is required when export_connector=clickhouse."
                exit 1
              fi
              if [ -z "$EXPORT_CH_TABLE" ]; then
                echo "EXPORT_CH_TABLE repository variable is required when export_connector=clickhouse."
                exit 1
              fi
              connector_args+=(--export-ch-database "$EXPORT_CH_DATABASE")
              connector_args+=(--export-ch-table "$EXPORT_CH_TABLE")
              export_args_ndjson=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "mssql" ]; then
              if [ -z "$EXPORT_MS_HOST" ]; then
                echo "EXPORT_MS_HOST repository variable is required when export_connector=mssql."
                exit 1
              fi
              if [ -z "$EXPORT_MS_DATABASE" ]; then
                echo "EXPORT_MS_DATABASE repository variable is required when export_connector=mssql."
                exit 1
              fi
              if [ -z "$EXPORT_MS_USER" ]; then
                echo "EXPORT_MS_USER repository variable is required when export_connector=mssql."
                exit 1
              fi
              if [ -z "$LLM_DIFF_EXPORT_MS_PASSWORD" ]; then
                echo "MSSQL_PASSWORD secret is required when export_connector=mssql."
                exit 1
              fi
              if [ -z "$EXPORT_MS_SCHEMA" ]; then
                echo "EXPORT_MS_SCHEMA repository variable is required when export_connector=mssql."
                exit 1
              fi
              if [ -z "$EXPORT_MS_TABLE" ]; then
                echo "EXPORT_MS_TABLE repository variable is required when export_connector=mssql."
                exit 1
              fi
              connector_args+=(--export-ms-host "$EXPORT_MS_HOST")
              connector_args+=(--export-ms-port "${EXPORT_MS_PORT:-1433}")
              connector_args+=(--export-ms-database "$EXPORT_MS_DATABASE")
              connector_args+=(--export-ms-user "$EXPORT_MS_USER")
              connector_args+=(--export-ms-schema "$EXPORT_MS_SCHEMA")
              connector_args+=(--export-ms-table "$EXPORT_MS_TABLE")
              export_args_ndjson=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "oracle" ]; then
              if [ -z "$EXPORT_OR_HOST" ]; then
                echo "EXPORT_OR_HOST repository variable is required when export_connector=oracle."
                exit 1
              fi
              if [ -z "$EXPORT_OR_SERVICE_NAME" ]; then
                echo "EXPORT_OR_SERVICE_NAME repository variable is required when export_connector=oracle."
                exit 1
              fi
              if [ -z "$EXPORT_OR_USER" ]; then
                echo "EXPORT_OR_USER repository variable is required when export_connector=oracle."
                exit 1
              fi
              if [ -z "$LLM_DIFF_EXPORT_OR_PASSWORD" ]; then
                echo "ORACLE_PASSWORD secret is required when export_connector=oracle."
                exit 1
              fi
              if [ -z "$EXPORT_OR_SCHEMA" ]; then
                echo "EXPORT_OR_SCHEMA repository variable is required when export_connector=oracle."
                exit 1
              fi
              if [ -z "$EXPORT_OR_TABLE" ]; then
                echo "EXPORT_OR_TABLE repository variable is required when export_connector=oracle."
                exit 1
              fi
              connector_args+=(--export-or-host "$EXPORT_OR_HOST")
              connector_args+=(--export-or-port "${EXPORT_OR_PORT:-1521}")
              connector_args+=(--export-or-service-name "$EXPORT_OR_SERVICE_NAME")
              connector_args+=(--export-or-user "$EXPORT_OR_USER")
              connector_args+=(--export-or-schema "$EXPORT_OR_SCHEMA")
              connector_args+=(--export-or-table "$EXPORT_OR_TABLE")
              export_args_ndjson=("${connector_args[@]}")
            elif [ "$EXPORT_CONNECTOR" = "mysql" ]; then
              if [ -z "$EXPORT_MYSQL_HOST" ]; then
                echo "EXPORT_MYSQL_HOST repository variable is required when export_connector=mysql."
                exit 1
              fi
              if [ -z "$EXPORT_MYSQL_DATABASE" ]; then
                echo "EXPORT_MYSQL_DATABASE repository variable is required when export_connector=mysql."
                exit 1
              fi
              if [ -z "$EXPORT_MYSQL_USER" ]; then
                echo "EXPORT_MYSQL_USER repository variable is required when export_connector=mysql."
                exit 1
              fi
              if [ -z "$LLM_DIFF_EXPORT_MYSQL_PASSWORD" ]; then
                echo "MYSQL_PASSWORD secret is required when export_connector=mysql."
                exit 1
              fi
              if [ -z "$EXPORT_MYSQL_TABLE" ]; then
                echo "EXPORT_MYSQL_TABLE repository variable is required when export_connector=mysql."
                exit 1
              fi
              connector_args+=(--export-mysql-host "$EXPORT_MYSQL_HOST")
              connector_args+=(--export-mysql-port "${EXPORT_MYSQL_PORT:-3306}")
              connector_args+=(--export-mysql-database "$EXPORT_MYSQL_DATABASE")
              connector_args+=(--export-mysql-user "$EXPORT_MYSQL_USER")
              connector_args+=(--export-mysql-table "$EXPORT_MYSQL_TABLE")
              export_args_ndjson=("${connector_args[@]}")
            else
              echo "Unsupported export_connector: $EXPORT_CONNECTOR"
              exit 1
            fi
          fi

          while IFS= read -r suite; do
            [ -z "$suite" ] && continue
            if [ ! -f "$suite" ]; then
              echo "Suite not found: $suite"
              exit 1
            fi

            suite_name="$(basename "$suite" .yaml)"
            output_file="artifacts/reports/${suite_name}.json"

            llm-diff run \
              --model-a "$MODEL_A" \
              --model-b "$MODEL_B" \
              --suite "$suite" \
              --max-workers "$MAX_WORKERS" \
              --factual-connector "$FACTUAL_CONNECTOR" \
              --factual-connector-timeout "$FACTUAL_CONNECTOR_TIMEOUT" \
              --factual-connector-max-results "$FACTUAL_CONNECTOR_MAX_RESULTS" \
              --output "$output_file"

            llm-diff report "$output_file" --format csv --output "artifacts/exports/${suite_name}.csv" "${export_args_csv[@]}"
            llm-diff report "$output_file" --format ndjson --output "artifacts/exports/${suite_name}.ndjson" "${export_args_ndjson[@]}"
            llm-diff report "$output_file" --format junit --output "artifacts/exports/${suite_name}.junit.xml" "${export_args_junit[@]}"
          done < suites_to_run.txt

      - name: Generate benchmark summary
        run: |
          mkdir -p artifacts/benchmark
          llm-diff benchmark artifacts/reports/*.json --format json --output artifacts/benchmark/benchmark.json
          llm-diff benchmark artifacts/reports/*.json --format markdown --output artifacts/benchmark/benchmark.md

      - name: Append benchmark summary to job summary
        if: always()
        run: |
          if [ -f artifacts/benchmark/benchmark.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/benchmark/benchmark.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload suite reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: model-upgrade-reports-${{ github.run_id }}
          path: artifacts/reports/
          if-no-files-found: error

      - name: Upload suite exports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: model-upgrade-exports-${{ github.run_id }}
          path: artifacts/exports/
          if-no-files-found: error

      - name: Upload benchmark summary
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: model-upgrade-benchmark-${{ github.run_id }}
          path: artifacts/benchmark/
          if-no-files-found: error

      - name: Aggregate suite results and apply gate policy
        run: |
          python - <<'PY'
          import glob
          import json
          import os

          from llm_behavior_diff.policy import evaluate_report_collection
          from llm_behavior_diff.schema import BehaviorReport

          report_paths = sorted(glob.glob("artifacts/reports/*.json"))
          if not report_paths:
              raise SystemExit("No reports found to evaluate regression gate.")

          policy = os.environ.get("GATE_POLICY", "strict").strip().lower() or "strict"
          policy_pack = os.environ.get("GATE_POLICY_PACK", "core").strip().lower() or "core"
          policy_file_value = os.environ.get("GATE_POLICY_FILE", "").strip()
          policy_file = policy_file_value if policy_file_value else None
          reports = []
          for path in report_paths:
              with open(path, encoding="utf-8") as f:
                  reports.append(BehaviorReport(**json.load(f)))

          collection_eval = evaluate_report_collection(
              reports,
              policy,
              policy_pack=policy_pack,
              policy_file=policy_file,
          )
          total_tests = int(collection_eval["totals"]["tests"])
          total_regressions = int(collection_eval["totals"]["regressions"])
          total_improvements = sum(int(report.improvements or 0) for report in reports)
          failed_suites = list(collection_eval["failed_suites"])
          resolved_policy_pack = str(collection_eval.get("policy_pack", policy_pack))
          policy_source = str(collection_eval.get("policy_source", f"builtin:{policy_pack}"))

          report_by_suite = {report.suite_name: report for report in reports}
          rows = []
          for suite_eval in collection_eval["suite_results"]:
              suite = str(suite_eval["suite_name"])
              report = report_by_suite[suite]
              tests = int(report.total_tests or 0)
              regressions = int(report.regressions or 0)
              improvements = int(report.improvements or 0)
              passed = bool(suite_eval["passed"])
              thresholds = suite_eval.get("thresholds", {})
              reasons = suite_eval.get("reasons", [])
              reasons_text = "; ".join(str(reason) for reason in reasons)
              allowed = (
                  thresholds.get("allowed_regressions", "n/a")
                  if isinstance(thresholds, dict)
                  else "n/a"
              )
              rows.append(
                  (
                      suite,
                      tests,
                      regressions,
                      improvements,
                      "PASS" if passed else "FAIL",
                      allowed,
                      reasons_text,
                  )
              )

          summary_lines = [
              "## Model Upgrade Regression Gate",
              "",
              f"- Model A: `{os.environ.get('MODEL_A', '')}`",
              f"- Model B: `{os.environ.get('MODEL_B', '')}`",
              f"- Gate Policy: `{policy}`",
              f"- Policy Pack: `{resolved_policy_pack}`",
              f"- Policy Source: `{policy_source}`",
              f"- Total Tests: {total_tests}",
              f"- Total Regressions: {total_regressions}",
              f"- Total Improvements: {total_improvements}",
              "",
              "| Suite | Tests | Regressions | Improvements | Policy Result | Allowed Regressions | Reasons |",
              "| --- | ---: | ---: | ---: | --- | ---: | --- |",
          ]

          for suite, tests, regressions, improvements, result, allowed, reasons_text in rows:
              summary_lines.append(
                  f"| {suite} | {tests} | {regressions} | {improvements} | {result} | {allowed} | {reasons_text} |"
              )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("\n".join(summary_lines) + "\n")

          if failed_suites:
              suites = ", ".join(failed_suites)
              raise SystemExit(
                  f"Regression gate failed under '{policy}' policy. Failed suite(s): {suites}"
              )

          print(f"Regression gate passed under '{policy}' policy.")
          PY
